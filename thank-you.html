<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mensagem Enviada — Omni Relax</title>
  <meta name="description" content="A sua mensagem foi enviada com sucesso. Entraremos em contacto brevemente." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .thankyou-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .thankyou-content {
      max-width: 560px;
    }
    .thankyou-content h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      font-weight: 600;
      color: #3b1f2b;
      margin-bottom: 1rem;
    }
    .thankyou-content p {
      font-family: 'Lato', sans-serif;
      font-size: 1.1rem;
      color: #5a3e4a;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .thankyou-content a {
      display: inline-block;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: #fff;
      background: linear-gradient(135deg, #6b2d3e, #3b1f2b);
      padding: 0.85rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.3s;
    }
    .thankyou-content a:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <section class="thankyou-section">
    <div class="thankyou-content">
      <div class="gold-line-center" style="margin-bottom:1.5rem"></div>
      <h1>Mensagem Enviada com Sucesso</h1>
      <p>Obrigado pelo seu contacto. A nossa equipa irá analisar o seu pedido e entraremos em contacto brevemente.</p>
      <a href="/">Voltar ao Início</a>
    </div>
  </section>
</body>
</html>
